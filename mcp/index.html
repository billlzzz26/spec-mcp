<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Service MCP UI Client</title>
    <script type="module">
        // Import the MCP UI client from the installed package
        import { UIResourceRenderer } from './node_modules/@mcp-ui/client/dist/index.js';

        // Define a simple MCP resource that returns HTML
        const skillServiceResource = {
            type: 'resource',
            resource: {
                uri: 'ui://skill-service/demo',
                mimeType: 'text/html;profile=mcp-app',
                text: `
                    <div style="padding: 20px; font-family: Arial, sans-serif; max-width: 600px;">
                        <h1>🔧 Skill Service MCP UI Demo</h1>
                        <p>This is a demonstration of the Model Context Protocol UI integration with the Skill Service.</p>
                        
                        <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 20px 0;">
                            <h3>Available Skills:</h3>
                            <ul>
                                <li>Agent MD Refactor - Refactor bloated agent instructions</li>
                                <li>Artifacts Builder - Create elaborate HTML artifacts</li>
                                <li>Changelog Generator - Create changelogs from git commits</li>
                                <li>MCP Builder - Build MCP servers for external services</li>
                            </ul>
                        </div>
                        
                        <button id="refreshBtn" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            Refresh Skills
                        </button>
                        
                        <div id="output" style="margin-top: 20px; padding: 15px; background: #e9f7ef; border-radius: 4px; min-height: 50px;">
                            <em>Click the button to see an action</em>
                        </div>
                    </div>
                `
            }
        };

        // Initialize the UI resource renderer when the DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('mcp-ui-container');
            
            // Create the UIResourceRenderer element
            const renderer = document.createElement('ui-resource-renderer');
            renderer.setAttribute('resource', JSON.stringify(skillServiceResource.resource));
            
            // Handle UI actions from the rendered content
            renderer.addEventListener('uiaction', (event) => {
                console.log('UI Action received:', event.detail);
                const outputDiv = document.getElementById('output');
                outputDiv.innerHTML = `<strong>Action:</strong> ${JSON.stringify(event.detail)}`;
                outputDiv.style.background = '#fff3cd';
            });
            
            // Add click handler to refresh button (demonstrates interaction)
            renderer.addEventListener('load', () => {
                const refreshBtn = document.getElementById('refreshBtn');
                if (refreshBtn) {
                    refreshBtn.addEventListener('click', () => {
                        // Simulate sending an action back to the server
                        renderer.dispatchEvent(new CustomEvent('uiaction', {
                            detail: {
                                type: 'refresh-skills',
                                timestamp: new Date().toISOString()
                            }
                        }));
                    });
                }
            });
            
            container.appendChild(renderer);
        });
    </script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        
        #mcp-ui-container {
            padding: 20px;
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        
        button:hover {
            background: #0056b3;
            transform: translateY(-2px);
            transition: all 0.2s ease;
        }
        
        ul {
            padding-left: 20px;
        }
        
        li {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div id="mcp-ui-container">
        <!-- MCP UI Content will be rendered here -->
    </div>
    
    <div style="text-align: center; margin-top: 30px; color: #666; font-size: 0.9em;">
        Skill Service • MCP UI Client Demo
    </div>
</body>
</html>
